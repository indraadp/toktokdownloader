<!DOCTYPE html>
<html lang="id">

<script>
  (function(){
    // baca cookie site_theme (fast minimal)
    const m = document.cookie.match('(?:^|; )site_theme=([^;]*)');
    const theme = m ? decodeURIComponent(m[1]) : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme','dark');
      try{ document.body && document.body.setAttribute('data-theme','dark'); }catch(e){}
    } else {
      document.documentElement.removeAttribute('data-theme');
      try{ document.body && document.body.removeAttribute('data-theme'); }catch(e){}
    }
  })();
</script>

 <script>
  /* ------------------------------
      Helper Cookie Functions
  ------------------------------ */
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
    const expires = "expires=" + d.toUTCString();
    document.cookie = name + "=" + encodeURIComponent(value) + ";" + expires + ";path=/";
  }

  function getCookie(name) {
    const match = document.cookie.match('(?:^|; )' + name + '=([^;]*)');
    return match ? decodeURIComponent(match[1]) : null;
  }

  /* ------------------------------
      Apply Theme From Cookie on Load
  ------------------------------ */
  const savedTheme = getCookie("site_theme"); // "dark" or "light"
  const root = document.body;

  if (savedTheme === "dark") {
    root.setAttribute("data-theme", "dark");
  } else {
    // default light
    root.removeAttribute("data-theme");
  }

  /* ------------------------------
      Toggle Logic + Save to Cookie
  ------------------------------ */
  const btn = document.getElementById('modeToggle');
  const icon = btn.querySelector('i');

  // Set initial icon based on loaded theme
  function updateIcon() {
    const isDark = root.getAttribute('data-theme') === 'dark';
    icon.classList.remove("fa-moon", "fa-sun");
    icon.classList.add(isDark ? "fa-sun" : "fa-moon");
  }
  updateIcon();

  btn.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';

    if (isDark) {
      // Switch to light mode
      root.removeAttribute('data-theme');
      setCookie("site_theme", "light", 365);
    } else {
      // Switch to dark mode
      root.setAttribute('data-theme', 'dark');
      setCookie("site_theme", "dark", 365);
    }

    updateIcon();
  });
</script>
